<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        a{
            list-style: none;
            text-decoration: none;
        }
        .header{
            display: flex;
            justify-content: space-around;
            color: crimson;
            font-size: 25px;
        }
    </style>
</head>
<body>
    <div class="header">
        <!-- <a href="./home.html">Home</a> -->
        <a href="./login.html">Login</a>
        <a href="./register.html">Register</a>
    </div>
    <div class="inputCont">

        <p>Home Page</p>
        <input type="text" name="searchInp" id="searchInp" placeholder="Search for user">
        <button onClick="fetchUser()"> Search</button>
    </div>

    <div class="nameContainer">

    </div>
    <div class="buttonContainer">

    </div>

    <script>
        var pageCount = 1
        async function fetchUser(){
            const inpValue = document.querySelector("#searchInp").value;

            let data = await fetch(`https://api.github.com/search/users?q=${inpValue}&per_page=10`)

            data = await data.json()
            console.log(data);
            var count = Math.ceil(data.items.length/30);
            console.log(count);
            
            var btn = document.createElement('button');
            var btn2 = document.createElement('button');
            btn.innerText = `Prev`
            btn.addEventListener("click",prevbuttonClick)
            document.querySelector('.buttonContainer').append(btn)
            btn2.innerText = `Next`
            btn2.addEventListener("click",nextbuttonClick)
            document.querySelector('.buttonContainer').append(btn2)
            
            for(var i=0;i<data.items.length;i++) {
                var newP = document.createElement("p")
                newP.innerText = data.items[i].login
                document.querySelector('.nameContainer').append(newP)

            }
        }

        async function prevbuttonClick(){
            
            if (pageCount==0) {
                return
            }
            pageCount--
            const inpValue = document.querySelector("#searchInp").value;
            
            let data = await fetch(`https://api.github.com/search/users?q=${inpValue}&page=${pageCount}&per_page=10`)
            
            data = await data.json()
            document.querySelector('.nameContainer').innerHTML = ""
            console.log("prevData",data,pageCount);
            for(var i=0;i<data.items.length;i++) {
                var newP = document.createElement("p")
                newP.innerText = data.items[i].login
                document.querySelector('.nameContainer').append(newP)

            }
        }
        async function nextbuttonClick(){
            pageCount++
            const inpValue = document.querySelector("#searchInp").value;

            let data = await fetch(`https://api.github.com/search/users?q=${inpValue}&page=${pageCount}&per_page=10`)

            data = await data.json()
            console.log("nextData",data,pageCount);
            document.querySelector('.nameContainer').innerHTML = ""
            for(var i=0;i<data.items.length;i++) {
                var newP = document.createElement("p")
                newP.innerText = data.items[i].login
                document.querySelector('.nameContainer').append(newP)

            }
        }
    </script> 
</body>
</html>
